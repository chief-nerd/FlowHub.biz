version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: flowhub_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: flowhub_redis
    ports:
      - "6379:6379"

  backend:
    build: ./server
    container_name: flowhub_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/flowhub
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    build: ./app
    container_name: flowhub_frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: flowhub_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
